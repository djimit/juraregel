name: JuraRegel CI Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      use-case:
        required: false
        type: string
        default: all

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JURAREGEL_CI_MODE: poc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: pip install fastapi uvicorn pydantic jsonschema pytest httpx pyyaml pytest-bdd
      - name: Schema check
        run: python3 ci/check-schema.py
      - name: Run unit tests
        run: python3 -m pytest use-cases/*/tests/ -q --no-header
      - name: Validate JREM exports
        run: python3 ci/validate-jrem.py
      - name: Legal review gate (warn only for PoC)
        run: bash ci/legal-review-gate.sh || echo LEGAL_REVIEW_WARNING
      - name: BDD tests
        run: python3 -m pytest features/ -q --no-header
      - name: CLI check
        run: node bin/juraregel.mjs --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files
        run: |
          test -f LICENSE && test -f README.md && test -f CHANGELOG.md
          test -f CONTRIBUTING.md && test -f CODE_OF_CONDUCT.md
          test -f docker-compose.yml && test -f Dockerfile
          echo All required files present

  pilot:
    runs-on: ubuntu-latest
    env:
      JURAREGEL_CI_MODE: pilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Schema check
        run: python3 ci/check-schema.py
      - name: Strict JREM validation
        run: python3 ci/validate-jrem.py
      - name: Legal review gate (strict)
        run: bash ci/legal-review-gate.sh
      - name: BDD tests
        run: python3 -m pytest features/ -q --no-header
