openapi: 3.1.0
info:
  title: Participatiewet Rule API
  description: Auditbare juridische rule service voor participatiewet
  version: 1.0.0
paths:
  /v1/health:
    get:
      summary: Health
      operationId: health_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/participatiewet/versions:
    get:
      summary: Get Versions
      operationId: get_versions_v1_participatiewet_versions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/rules/{rule_id}:
    get:
      summary: Get Rule
      operationId: get_rule_v1_rules__rule_id__get
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/audit/{calculation_id}:
    get:
      summary: Get Audit
      operationId: get_audit_v1_audit__calculation_id__get
      parameters:
      - name: calculation_id
        in: path
        required: true
        schema:
          type: string
          title: Calculation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/participatiewet/calculate:
    post:
      summary: Calculate Participatiewet
      operationId: calculate_participatiewet_v1_participatiewet_calculate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipatiewetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/participatiewet/explain:
    post:
      summary: Explain Participatiewet
      operationId: explain_participatiewet_v1_participatiewet_explain_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipatiewetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ParticipatiewetRequest:
      properties:
        huishoudenType:
          anyOf:
          - type: string
          - type: 'null'
          title: Huishoudentype
        leeftijd:
          anyOf:
          - type: integer
          - type: 'null'
          title: Leeftijd
        alleenstaande:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Alleenstaande
        medebewoners:
          anyOf:
          - type: integer
          - type: 'null'
          title: Medebewoners
        medebewonerZelfstandigeHuishouding:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Medebewonerzelfstandigehuishouding
        vermogen:
          anyOf:
          - type: number
          - type: 'null'
          title: Vermogen
        inkomen:
          anyOf:
          - {}
          - type: 'null'
          title: Inkomen
        inkomenUitWerk:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Inkomenuitwerk
        maandenAanHetWerk:
          anyOf:
          - type: integer
          - type: 'null'
          title: Maandenaanhetwerk
        verwijtbareWerkloosheid:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Verwijtbarewerkloosheid
        uitkeringOntvangen:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Uitkeringontvangen
        arbeidsgeschikt:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Arbeidsgeschikt
        arbeidsbeperking:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Arbeidsbeperking
        doelgroepregister:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Doelgroepregister
        alleenstaandMetLangeDuur:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Alleenstaandmetlangeduur
      type: object
      title: ParticipatiewetRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
