openapi: 3.1.0
info:
  title: Bio2 Rule API
  description: Auditbare juridische rule service voor bio2
  version: 1.0.0
paths:
  /v1/health:
    get:
      summary: Health
      operationId: health_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/bio2/versions:
    get:
      summary: Get Versions
      operationId: get_versions_v1_bio2_versions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/rules/{rule_id}:
    get:
      summary: Get Rule
      operationId: get_rule_v1_rules__rule_id__get
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/bio2/calculate:
    post:
      summary: Calculate
      operationId: calculate_v1_bio2_calculate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/audit/{calculation_id}:
    get:
      summary: Get Audit
      operationId: get_audit_v1_audit__calculation_id__get
      parameters:
      - name: calculation_id
        in: path
        required: true
        schema:
          type: string
          title: Calculation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    CalculateRequest:
      properties:
        calculationDate:
          type: string
          title: Calculationdate
          description: ISO 8601 datum
        zaak:
          $ref: '#/components/schemas/ZaakInput'
        partij:
          $ref: '#/components/schemas/PartijInput'
        zaakIdentificatie:
          anyOf:
          - type: string
          - type: 'null'
          title: Zaakidentificatie
        tariefjaar:
          anyOf:
          - type: integer
          - type: 'null'
          title: Tariefjaar
      type: object
      required:
      - calculationDate
      - zaak
      - partij
      title: CalculateRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PartijInput:
      properties:
        rol:
          type: string
          title: Rol
          description: eiser, gedaagde, verzoeker, verweerder
        partijType:
          type: string
          title: Partijtype
          description: natuurlijk_persoon, niet_natuurlijk_persoon, onvermogend
        onvermogend:
          type: boolean
          title: Onvermogend
          default: false
        verweerStatus:
          type: string
          title: Verweerstatus
          default: n.v.t.
      type: object
      required:
      - rol
      - partijType
      title: PartijInput
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ZaakInput:
      properties:
        rechtsgebied:
          type: string
          title: Rechtsgebied
          default: civiel
        zaakstroom:
          type: string
          title: Zaakstroom
          description: kanton of handel
        procedureType:
          type: string
          title: Proceduretype
          description: dagvaarding
        vorderingWaarde:
          anyOf:
          - type: number
          - type: string
          - type: 'null'
          title: Vorderingwaarde
          description: Bedrag of 'onbepaald'
        bijzondereCategorie:
          type: string
          title: Bijzonderecategorie
          default: geen
      type: object
      required:
      - zaakstroom
      - procedureType
      title: ZaakInput
