openapi: 3.1.0
info:
  title: Basisregistraties Rule API
  description: Auditbare juridische rule service voor basisregistraties
  version: 1.0.0
paths:
  /v1/health:
    get:
      summary: Health
      operationId: health_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/basisregistraties/versions:
    get:
      summary: Get Versions
      operationId: get_versions_v1_basisregistraties_versions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/rules/{rule_id}:
    get:
      summary: Get Rule
      operationId: get_rule_v1_rules__rule_id__get
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/audit/{calculation_id}:
    get:
      summary: Get Audit
      operationId: get_audit_v1_audit__calculation_id__get
      parameters:
      - name: calculation_id
        in: path
        required: true
        schema:
          type: string
          title: Calculation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/basisregistraties/calculate:
    post:
      summary: Calculate Basisregistratie
      operationId: calculate_basisregistratie_v1_basisregistraties_calculate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasisregistratieRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/basisregistraties/explain:
    post:
      summary: Explain Basisregistratie
      operationId: explain_basisregistratie_v1_basisregistraties_explain_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasisregistratieRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    BasisregistratieRequest:
      properties:
        registratie:
          type: string
          title: Registratie
          description: BRP, BAG, NHR, BRT, WOZ
        vrager:
          anyOf:
          - type: string
          - type: 'null'
          title: Vrager
        doel:
          anyOf:
          - type: string
          - type: 'null'
          title: Doel
        grondslag:
          anyOf:
          - type: string
          - type: 'null'
          title: Grondslag
        gebruiksdoel:
          anyOf:
          - type: string
          - type: 'null'
          title: Gebruiksdoel
        eigenObject:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Eigenobject
        doelGeregistreerd:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Doelgeregistreerd
        verwerkingslog:
          anyOf:
          - type: string
          - type: 'null'
          title: Verwerkingslog
        besluitvorming:
          anyOf:
          - type: string
          - type: 'null'
          title: Besluitvorming
        menselijkeControle:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Menselijkecontrole
        gevraagdeGegevens:
          anyOf:
          - type: string
          - type: 'null'
          title: Gevraagdegegevens
        wettelijkeGrondslag:
          anyOf:
          - type: string
          - type: 'null'
          title: Wettelijkegrondslag
      type: object
      required:
      - registratie
      title: BasisregistratieRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
