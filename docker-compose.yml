# JuraRegel — Full stack: PostgreSQL + Qdrant + Keycloak + API + Dashboard
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgres     # Start only PostgreSQL
#   docker compose down               # Stop all
#   docker compose logs -f api        # Follow API logs
#
# Services:
#   postgres   — Multi-tenant database with RLS
#   qdrant     — Vector store for RAG pipeline
#   keycloak   — OAuth2 / OIDC authentication
#   api        — JuraRegel REST API (FastAPI)
#   dashboard  — JuraRegel Compliance Dashboard (Next.js)

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  # Uses existing PostgreSQL on host (port 5432 already in use)
  # Create a dedicated database in the existing instance
  # No container needed — we connect to the host's PostgreSQL

  # ─── Qdrant Vector Store ──────────────────────────────────
  # Uses existing Qdrant on host (port 6333 already in use)
  # No container needed — we connect to the host's Qdrant

  # ─── JuraRegel API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: juraregel-api
    ports:
      - "8091:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://juraregel:juraregel@192.168.1.28:5432/juraregel
      QDRANT_URL: http://192.168.1.28:6333
      JURAREGEL_CI_MODE: production
    restart: unless-stopped
    networks:
      - juraregel-net

  # ─── JuraRegel Dashboard ──────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: juraregel-dashboard
    ports:
      - "3005:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.28:8091
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - juraregel-net

volumes:
  juraregel-pgdata:
    driver: local
  juraregel-qdrant:
    driver: local

networks:
  juraregel-net:
    driver: bridge
