services:
  griffierecht:
    build: .
    ports: ["8490:8490"]

  publicatie:
    build: .
    command: ["uvicorn", "app:app", "--app-dir", "use-cases/publicatie/api", "--host", "0.0.0.0", "--port", "8493"]
    ports: ["8493:8493"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8493/v1/health')"]
