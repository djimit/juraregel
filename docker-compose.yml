version: "3.9"

services:
  juraregel-mcp:
    build: ./mcp-server
    ports:
      - "8490:8490"
    volumes:
      - ./use-cases:/app/use-cases
    environment:
      - JURAREGEL_ENV=production
    restart: unless-stopped

  juraregel-cloud:
    build: ./cloud
    ports:
      - "8527:8527"
    environment:
      - JURAREGEL_ENV=production
      - DATABASE_URL=sqlite:///data/juraregel.db
    volumes:
      - cloud-data:/app/data
    restart: unless-stopped

  juraregel-scraper:
    build: ./scraper
    environment:
      - JURAREGEL_ENV=production
      - CHECK_INTERVAL_HOURS=24
    volumes:
      - ./use-cases:/app/use-cases
    restart: unless-stopped

volumes:
  cloud-data:
